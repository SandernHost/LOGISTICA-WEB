<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiGest - Sistema de Gestión Logística</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .loader { border-top-color: #3490dc; animation: spinner 0.6s linear infinite; }
        @keyframes spinner { to { transform: rotate(360deg); } }
        .nav-active { background-color: #1e40af; color: white; }
        .card-hover:hover { transform: translateY(-2px); transition: 0.2s; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-gray-100">

    <div class="min-h-screen flex flex-col">
        <!-- Navbar -->
        <nav class="bg-blue-800 text-white shadow-lg">
            <div class="container mx-auto px-4 py-3 flex justify-between items-center">
                <div class="flex items-center space-x-2">
                    <i class="fas fa-truck-fast text-2xl"></i>
                    <span class="font-bold text-xl">LogiGest</span>
                </div>
                <div>
                    <span class="text-sm">Modo demo - Sin autenticación</span>
                </div>
            </div>
        </nav>

        <!-- Sidebar + Contenido -->
        <div class="flex flex-1">
            <aside class="w-64 bg-white shadow-md overflow-y-auto">
                <div class="py-4">
                    <a href="#" data-module="dashboard" class="nav-item block px-4 py-2 text-gray-700 hover:bg-blue-100 hover:text-blue-800">
                        <i class="fas fa-tachometer-alt mr-2"></i> Dashboard
                    </a>
                    <div class="border-t my-2"></div>
                    <h3 class="px-4 text-xs font-semibold text-gray-500 uppercase">Maestros</h3>
                    <a href="#" data-module="empresas" class="nav-item block px-4 py-2 text-gray-700 hover:bg-blue-100 hover:text-blue-800">
                        <i class="fas fa-building mr-2"></i> Empresas
                    </a>
                    <a href="#" data-module="almacenes" class="nav-item block px-4 py-2 text-gray-700 hover:bg-blue-100 hover:text-blue-800">
                        <i class="fas fa-warehouse mr-2"></i> Almacenes
                    </a>
                    <a href="#" data-module="productos" class="nav-item block px-4 py-2 text-gray-700 hover:bg-blue-100 hover:text-blue-800">
                        <i class="fas fa-boxes mr-2"></i> Productos
                    </a>
                    <a href="#" data-module="proveedores" class="nav-item block px-4 py-2 text-gray-700 hover:bg-blue-100 hover:text-blue-800">
                        <i class="fas fa-truck mr-2"></i> Proveedores
                    </a>
                    <a href="#" data-module="clientes" class="nav-item block px-4 py-2 text-gray-700 hover:bg-blue-100 hover:text-blue-800">
                        <i class="fas fa-users mr-2"></i> Clientes
                    </a>
                    <a href="#" data-module="empleados" class="nav-item block px-4 py-2 text-gray-700 hover:bg-blue-100 hover:text-blue-800">
                        <i class="fas fa-id-badge mr-2"></i> Empleados
                    </a>
                    <div class="border-t my-2"></div>
                    <h3 class="px-4 text-xs font-semibold text-gray-500 uppercase">Operaciones</h3>
                    <a href="#" data-module="compras" class="nav-item block px-4 py-2 text-gray-700 hover:bg-blue-100 hover:text-blue-800">
                        <i class="fas fa-shopping-cart mr-2"></i> Órdenes de Compra
                    </a>
                    <a href="#" data-module="ventas" class="nav-item block px-4 py-2 text-gray-700 hover:bg-blue-100 hover:text-blue-800">
                        <i class="fas fa-chart-line mr-2"></i> Órdenes de Venta
                    </a>
                    <a href="#" data-module="inventario" class="nav-item block px-4 py-2 text-gray-700 hover:bg-blue-100 hover:text-blue-800">
                        <i class="fas fa-database mr-2"></i> Inventario
                    </a>
                    <a href="#" data-module="transporte" class="nav-item block px-4 py-2 text-gray-700 hover:bg-blue-100 hover:text-blue-800">
                        <i class="fas fa-shipping-fast mr-2"></i> Transporte
                    </a>
                    <div class="border-t my-2"></div>
                    <h3 class="px-4 text-xs font-semibold text-gray-500 uppercase">Reportes</h3>
                    <a href="#" data-module="reportes" class="nav-item block px-4 py-2 text-gray-700 hover:bg-blue-100 hover:text-blue-800">
                        <i class="fas fa-chart-pie mr-2"></i> Reportes
                    </a>
                </div>
            </aside>

            <main class="flex-1 p-6 overflow-y-auto" id="dynamic-content">
                <div class="text-center py-20">
                    <i class="fas fa-spinner fa-spin text-4xl text-blue-500"></i>
                    <p class="mt-2">Cargando módulo...</p>
                </div>
            </main>
        </div>
    </div>

    <script>
        // Configuración de Supabase (tu URL y clave anónima)
        const SUPABASE_URL = 'https://timhcltyedhsazlzcneq.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_2oBoopRGy3Tff7wjkwdP2A_RHYbctkQ';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Cargar módulo por defecto
        loadModule('dashboard');

        // Navegación
        document.querySelectorAll('.nav-item').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const module = link.getAttribute('data-module');
                if (module) loadModule(module);
                document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('bg-blue-100', 'text-blue-800'));
                link.classList.add('bg-blue-100', 'text-blue-800');
            });
        });

        function loadModule(module) {
            const contentDiv = document.getElementById('dynamic-content');
            contentDiv.innerHTML = '<div class="flex justify-center items-center h-64"><div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12"></div></div>';
            setTimeout(async () => {
                try {
                    if (module === 'dashboard') await renderDashboard(contentDiv);
                    else if (module === 'empresas') await renderEmpresas(contentDiv);
                    else if (module === 'almacenes') await renderAlmacenes(contentDiv);
                    else if (module === 'productos') await renderProductos(contentDiv);
                    else if (module === 'proveedores') await renderProveedores(contentDiv);
                    else if (module === 'clientes') await renderClientes(contentDiv);
                    else if (module === 'empleados') await renderEmpleados(contentDiv);
                    else if (module === 'compras') await renderCompras(contentDiv);
                    else if (module === 'ventas') await renderVentas(contentDiv);
                    else if (module === 'inventario') await renderInventario(contentDiv);
                    else if (module === 'transporte') await renderTransporte(contentDiv);
                    else if (module === 'reportes') await renderReportes(contentDiv);
                    else contentDiv.innerHTML = '<p>Módulo no encontrado</p>';
                } catch (err) {
                    contentDiv.innerHTML = `<div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded">Error: ${err.message}</div>`;
                }
            }, 300);
        }

        // ===================== MÓDULO DASHBOARD =====================
        async function renderDashboard(container) {
            const { count: empresasCount } = await supabase.from('empresas').select('*', { count: 'exact', head: true }).catch(() => ({ count: 0 }));
            const { count: productosCount } = await supabase.from('productos').select('*', { count: 'exact', head: true }).catch(() => ({ count: 0 }));
            const { data: ventas } = await supabase.from('ordenes_venta').select('total').eq('estado', 'entregada').catch(() => ({ data: [] }));
            const totalVentas = ventas?.reduce((sum, v) => sum + (v.total || 0), 0) || 0;

            container.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="bg-white p-6 rounded shadow card-hover"><div class="flex items-center"><div class="p-3 bg-blue-100 rounded-full"><i class="fas fa-building text-blue-600 text-2xl"></i></div><div class="ml-4"><h3 class="text-gray-500">Empresas</h3><p class="text-2xl font-bold">${empresasCount || 0}</p></div></div></div>
                    <div class="bg-white p-6 rounded shadow card-hover"><div class="flex items-center"><div class="p-3 bg-green-100 rounded-full"><i class="fas fa-boxes text-green-600 text-2xl"></i></div><div class="ml-4"><h3 class="text-gray-500">Productos</h3><p class="text-2xl font-bold">${productosCount || 0}</p></div></div></div>
                    <div class="bg-white p-6 rounded shadow card-hover"><div class="flex items-center"><div class="p-3 bg-yellow-100 rounded-full"><i class="fas fa-chart-line text-yellow-600 text-2xl"></i></div><div class="ml-4"><h3 class="text-gray-500">Ventas Totales</h3><p class="text-2xl font-bold">S/ ${totalVentas.toFixed(2)}</p></div></div></div>
                </div>
                <div class="bg-white p-6 rounded shadow"><h3 class="text-lg font-semibold mb-4">Últimas Órdenes de Venta</h3><div id="ultimas-ventas" class="overflow-x-auto"><p class="text-gray-500">Cargando...</p></div></div>
            `;
            const { data: ultimas } = await supabase.from('ordenes_venta').select('numero_ov, fecha_pedido, cliente_id, total, estado').order('fecha_pedido', { ascending: false }).limit(5);
            const tabla = `<table class="min-w-full"><thead> <th>N° OV</th><th>Fecha</th><th>Cliente</th><th>Total</th><th>Estado</th> </thead><tbody>${
                ultimas?.map(ov => `tr> <td>${ov.numero_ov}</td><td>${ov.fecha_pedido}</td><td>${ov.cliente_id}</td><td>S/ ${ov.total?.toFixed(2)}</td><td>${ov.estado}</td> </tr`).join('') || '<tr><td colspan="5">No hay datos</td></tr>'
            }</tbody> </table>`;
            document.getElementById('ultimas-ventas').innerHTML = tabla;
        }

        // ===================== MÓDULO EMPRESAS =====================
        async function renderEmpresas(container) {
            const { data: empresas } = await supabase.from('empresas').select('*');
            container.innerHTML = `
                <div class="flex justify-between items-center mb-4"><h2 class="text-2xl font-bold">Empresas</h2>
                <button onclick="mostrarFormularioEmpresa()" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700"><i class="fas fa-plus"></i> Nueva Empresa</button></div>
                <div class="bg-white rounded shadow overflow-x-auto"><table class="min-w-full"><thead> <th>Código</th><th>Nombre</th><th>RUC</th><th>País</th><th>Moneda</th><th>Acciones</th> </thead><tbody>
                ${empresas?.map(emp => `<tr><td>${emp.codigo}</td><td>${emp.nombre}</td><td>${emp.ruc}</td><td>${emp.pais}</td><td>${emp.moneda}</td><td><button onclick="editarEmpresa(${emp.id})" class="text-blue-600"><i class="fas fa-edit"></i></button> <button onclick="eliminarEmpresa(${emp.id})" class="text-red-600 ml-2"><i class="fas fa-trash"></i></button></td></tr>`).join('') || '<tr><td colspan="6">No hay registros</td></tr>'}
                </tbody> </table></div>
            `;
            window.mostrarFormularioEmpresa = () => mostrarModalEmpresa();
            window.editarEmpresa = async (id) => { const { data } = await supabase.from('empresas').select('*').eq('id', id).single(); mostrarModalEmpresa(data); };
            window.eliminarEmpresa = async (id) => {
                if (!confirm('¿Eliminar empresa? Se perderán datos asociados.')) return;
                await supabase.from('empresas').delete().eq('id', id);
                renderEmpresas(container);
                Swal.fire('Eliminado', 'Empresa eliminada', 'success');
            };
        }

        function mostrarModalEmpresa(empresa = null) {
            Swal.fire({
                title: empresa ? 'Editar Empresa' : 'Nueva Empresa',
                html: `
                    <input id="codigo" class="swal2-input" placeholder="Código" value="${empresa?.codigo || ''}">
                    <input id="nombre" class="swal2-input" placeholder="Nombre" value="${empresa?.nombre || ''}">
                    <input id="ruc" class="swal2-input" placeholder="RUC" value="${empresa?.ruc || ''}">
                    <input id="pais" class="swal2-input" placeholder="País" value="${empresa?.pais || ''}">
                    <input id="moneda" class="swal2-input" placeholder="Moneda" value="${empresa?.moneda || 'USD'}">
                `,
                preConfirm: async () => {
                    const data = {
                        codigo: document.getElementById('codigo').value,
                        nombre: document.getElementById('nombre').value,
                        ruc: document.getElementById('ruc').value,
                        pais: document.getElementById('pais').value,
                        moneda: document.getElementById('moneda').value,
                        razon_social: document.getElementById('nombre').value,
                    };
                    if (empresa) await supabase.from('empresas').update(data).eq('id', empresa.id);
                    else await supabase.from('empresas').insert(data);
                    renderEmpresas(document.getElementById('dynamic-content'));
                }
            });
        }

        // ===================== MÓDULO ALMACENES =====================
        async function renderAlmacenes(container) {
            const { data: almacenes } = await supabase.from('almacenes').select('*, empresas(nombre)');
            container.innerHTML = `
                <div class="flex justify-between items-center mb-4"><h2 class="text-2xl font-bold">Almacenes</h2>
                <button onclick="mostrarFormularioAlmacen()" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700"><i class="fas fa-plus"></i> Nuevo Almacén</button></div>
                <div class="bg-white rounded shadow overflow-x-auto"><table class="min-w-full"><thead> <th>Código</th><th>Nombre</th><th>Empresa</th><th>Tipo</th><th>Ciudad</th><th>Capacidad (m³)</th><th>Acciones</th> </thead><tbody>
                ${almacenes?.map(alm => `<tr><td>${alm.codigo}</td><td>${alm.nombre}</td><td>${alm.empresas?.nombre}</td><td>${alm.tipo}</td><td>${alm.ciudad}</td><td>${alm.capacidad_volumen}</td><td><button onclick="editarAlmacen(${alm.id})" class="text-blue-600"><i class="fas fa-edit"></i></button> <button onclick="eliminarAlmacen(${alm.id})" class="text-red-600 ml-2"><i class="fas fa-trash"></i></button></td></tr>`).join('') || '<tr><td colspan="7">No hay registros</td></tr>'}
                </tbody> </table></div>
            `;
            window.mostrarFormularioAlmacen = () => mostrarModalAlmacen();
            window.editarAlmacen = async (id) => { const { data } = await supabase.from('almacenes').select('*').eq('id', id).single(); mostrarModalAlmacen(data); };
            window.eliminarAlmacen = async (id) => {
                if (!confirm('¿Eliminar almacén?')) return;
                await supabase.from('almacenes').delete().eq('id', id);
                renderAlmacenes(container);
                Swal.fire('Eliminado', 'Almacén eliminado', 'success');
            };
        }

        function mostrarModalAlmacen(almacen = null) {
            Swal.fire({
                title: almacen ? 'Editar Almacén' : 'Nuevo Almacén',
                html: `
                    <input id="codigo" class="swal2-input" placeholder="Código" value="${almacen?.codigo || ''}">
                    <input id="nombre" class="swal2-input" placeholder="Nombre" value="${almacen?.nombre || ''}">
                    <select id="empresa_id" class="swal2-select"></select>
                    <select id="tipo" class="swal2-select"><option>principal</option><option>secundario</option><option>transitorio</option><option>virtual</option></select>
                    <input id="ciudad" class="swal2-input" placeholder="Ciudad" value="${almacen?.ciudad || ''}">
                    <input id="capacidad_volumen" class="swal2-input" placeholder="Capacidad volumen (m³)" value="${almacen?.capacidad_volumen || ''}">
                `,
                didOpen: async () => {
                    const { data: empresas } = await supabase.from('empresas').select('id, nombre');
                    const select = document.getElementById('empresa_id');
                    empresas.forEach(emp => {
                        const option = document.createElement('option');
                        option.value = emp.id;
                        option.text = emp.nombre;
                        if (almacen && almacen.empresa_id === emp.id) option.selected = true;
                        select.appendChild(option);
                    });
                },
                preConfirm: async () => {
                    const data = {
                        codigo: document.getElementById('codigo').value,
                        nombre: document.getElementById('nombre').value,
                        empresa_id: parseInt(document.getElementById('empresa_id').value),
                        tipo: document.getElementById('tipo').value,
                        ciudad: document.getElementById('ciudad').value,
                        capacidad_volumen: parseFloat(document.getElementById('capacidad_volumen').value) || 0,
                    };
                    if (almacen) await supabase.from('almacenes').update(data).eq('id', almacen.id);
                    else await supabase.from('almacenes').insert(data);
                    renderAlmacenes(document.getElementById('dynamic-content'));
                }
            });
        }

        // ===================== MÓDULO PRODUCTOS =====================
        async function renderProductos(container) {
            const { data: productos } = await supabase.from('productos').select('*');
            container.innerHTML = `
                <div class="flex justify-between items-center mb-4"><h2 class="text-2xl font-bold">Productos</h2>
                <button onclick="mostrarFormularioProducto()" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700"><i class="fas fa-plus"></i> Nuevo Producto</button></div>
                <div class="bg-white rounded shadow overflow-x-auto"><table class="min-w-full"><thead> <th>SKU</th><th>Nombre</th><th>Categoría</th><th>Marca</th><th>Peso (kg)</th><th>Volumen (m³)</th><th>Acciones</th> </thead><tbody>
                ${productos?.map(prod => `<tr><td>${prod.sku}</td><td>${prod.nombre}</td><td>${prod.categoria}</td><td>${prod.marca}</td><td>${prod.peso_unitario}</td><td>${prod.volumen_unitario}</td><td><button onclick="editarProducto(${prod.id})" class="text-blue-600"><i class="fas fa-edit"></i></button> <button onclick="eliminarProducto(${prod.id})" class="text-red-600 ml-2"><i class="fas fa-trash"></i></button></td></tr>`).join('') || '<tr><td colspan="7">No hay productos</td></tr>'}
                </tbody> </table></div>
            `;
            window.mostrarFormularioProducto = () => mostrarModalProducto();
            window.editarProducto = async (id) => { const { data } = await supabase.from('productos').select('*').eq('id', id).single(); mostrarModalProducto(data); };
            window.eliminarProducto = async (id) => {
                if (!confirm('¿Eliminar producto?')) return;
                await supabase.from('productos').delete().eq('id', id);
                renderProductos(container);
                Swal.fire('Eliminado', 'Producto eliminado', 'success');
            };
        }

        function mostrarModalProducto(producto = null) {
            Swal.fire({
                title: producto ? 'Editar Producto' : 'Nuevo Producto',
                html: `
                    <input id="sku" class="swal2-input" placeholder="SKU" value="${producto?.sku || ''}">
                    <input id="nombre" class="swal2-input" placeholder="Nombre" value="${producto?.nombre || ''}">
                    <input id="categoria" class="swal2-input" placeholder="Categoría" value="${producto?.categoria || ''}">
                    <input id="marca" class="swal2-input" placeholder="Marca" value="${producto?.marca || ''}">
                    <input id="peso_unitario" class="swal2-input" placeholder="Peso unitario (kg)" value="${producto?.peso_unitario || ''}">
                    <input id="volumen_unitario" class="swal2-input" placeholder="Volumen unitario (m³)" value="${producto?.volumen_unitario || ''}">
                `,
                preConfirm: async () => {
                    const data = {
                        sku: document.getElementById('sku').value,
                        nombre: document.getElementById('nombre').value,
                        categoria: document.getElementById('categoria').value,
                        marca: document.getElementById('marca').value,
                        peso_unitario: parseFloat(document.getElementById('peso_unitario').value) || 0,
                        volumen_unitario: parseFloat(document.getElementById('volumen_unitario').value) || 0,
                        unidad_peso_id: 1,
                        unidad_volumen_id: 2,
                        unidad_dimension_id: 1,
                    };
                    if (producto) await supabase.from('productos').update(data).eq('id', producto.id);
                    else await supabase.from('productos').insert(data);
                    renderProductos(document.getElementById('dynamic-content'));
                }
            });
        }

        // ===================== MÓDULO PROVEEDORES =====================
        async function renderProveedores(container) {
            const { data: proveedores } = await supabase.from('proveedores').select('*');
            container.innerHTML = `
                <div class="flex justify-between items-center mb-4"><h2 class="text-2xl font-bold">Proveedores</h2>
                <button onclick="mostrarFormularioProveedor()" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700"><i class="fas fa-plus"></i> Nuevo Proveedor</button></div>
                <div class="bg-white rounded shadow overflow-x-auto"><table class="min-w-full"><thead> <th>Código</th><th>Nombre</th><th>RUC</th><th>Teléfono</th><th>Ciudad</th><th>Plazo (días)</th><th>Acciones</th> </thead><tbody>
                ${proveedores?.map(prov => `<tr><td>${prov.codigo}</td><td>${prov.nombre}</td><td>${prov.ruc}</td><td>${prov.contacto_telefono}</td><td>${prov.ciudad}</td><td>${prov.plazo_entrega_dias}</td><td><button onclick="editarProveedor(${prov.id})" class="text-blue-600"><i class="fas fa-edit"></i></button> <button onclick="eliminarProveedor(${prov.id})" class="text-red-600 ml-2"><i class="fas fa-trash"></i></button></td></tr>`).join('') || '<tr><td colspan="7">No hay proveedores</td></tr>'}
                </tbody> </table></div>
            `;
            window.mostrarFormularioProveedor = () => mostrarModalProveedor();
            window.editarProveedor = async (id) => { const { data } = await supabase.from('proveedores').select('*').eq('id', id).single(); mostrarModalProveedor(data); };
            window.eliminarProveedor = async (id) => {
                if (!confirm('¿Eliminar proveedor?')) return;
                await supabase.from('proveedores').delete().eq('id', id);
                renderProveedores(container);
                Swal.fire('Eliminado', 'Proveedor eliminado', 'success');
            };
        }

        function mostrarModalProveedor(proveedor = null) {
            Swal.fire({
                title: proveedor ? 'Editar Proveedor' : 'Nuevo Proveedor',
                html: `
                    <input id="codigo" class="swal2-input" placeholder="Código" value="${proveedor?.codigo || ''}">
                    <input id="nombre" class="swal2-input" placeholder="Nombre" value="${proveedor?.nombre || ''}">
                    <input id="ruc" class="swal2-input" placeholder="RUC" value="${proveedor?.ruc || ''}">
                    <input id="telefono" class="swal2-input" placeholder="Teléfono" value="${proveedor?.contacto_telefono || ''}">
                    <input id="ciudad" class="swal2-input" placeholder="Ciudad" value="${proveedor?.ciudad || ''}">
                    <input id="plazo" class="swal2-input" placeholder="Plazo entrega (días)" value="${proveedor?.plazo_entrega_dias || ''}">
                `,
                preConfirm: async () => {
                    const data = {
                        codigo: document.getElementById('codigo').value,
                        nombre: document.getElementById('nombre').value,
                        ruc: document.getElementById('ruc').value,
                        contacto_telefono: document.getElementById('telefono').value,
                        ciudad: document.getElementById('ciudad').value,
                        plazo_entrega_dias: parseInt(document.getElementById('plazo').value) || 0,
                    };
                    if (proveedor) await supabase.from('proveedores').update(data).eq('id', proveedor.id);
                    else await supabase.from('proveedores').insert(data);

                        div.innerHTML = `<select class="producto-select mt-2"></select><input type="number" placeholder="Cantidad" class="cantidad-input ml-2 w-24"><input type="number" placeholder="Precio" class="precio-input ml-2 w-24"><button class="remove-item text-red-600 ml-2">X</button>`;
                        container.appendChild(div);
                        supabase.from('productos').select('id, nombre').then(({ data }) => {
                            const sel = div.querySelector('.producto-select');
                            data.forEach(prod => {
                                const opt = document.createElement('option');
                                opt.value = prod.id;
                                opt.text = prod.nombre;
                                sel.appendChild(opt);
                            });
                        });
                        div.querySelector('.remove-item').addEventListener('click', () => div.remove());
                    });

                    const proveedor_id = parseInt(document.getElementById('proveedor_id').value);

                    document.querySelectorAll('#items-oc > div').forEach(div => {
                        const producto_id = div.querySelector('.producto-select').value;
                        const cantidad = div.querySelector('.cantidad-input').value;
                        const precio = div.querySelector('.precio-input').value;
                        if (producto_id && cantidad && precio) items.push({ producto_id: parseInt(producto_id), cantidad: parseFloat(cantidad), precio: parseFloat(precio) });

                    if (items.length === 0) throw new Error('Agregue al menos un producto');

                    return true;
                }
            });
        }

            container.innerHTML = `
                <h2 class="text-2xl font-bold mb-4">Reportes</h2>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-white p-4 rounded shadow"><h3 class="text-lg font-semibold mb-2">Ventas por Mes</h3><canvas id="ventasChart" width="400" height="200"></canvas></div>
                    <div class="bg-white p-4 rounded shadow"><h3 class="text-lg font-semibold mb-2">Top 5 Productos Más Vendidos</h3><div id="topProductos"></div></div>
                </div>
            `;
            const ctx = document.getElementById('ventasChart').getContext('2d');
            new Chart(ctx, { type: 'bar', data: { labels, datasets: [{ label: 'Ventas (S/)', data: values, backgroundColor: 'rgba(54, 162, 235, 0.5)' }] } });

            const { data: detalles } = await supabase.from('ov_detalles').select('producto_id, cantidad');
            const grouped = {};
            detalles?.forEach(d => grouped[d.producto_id] = (grouped[d.producto_id] || 0) + d.cantidad);
            const sorted = Object.entries(grouped).sort((a,b) => b[1] - a[1]).slice(0,5);
            const productosNombres = await Promise.all(sorted.map(async ([id, total]) => {
                const { data: prod } = await supabase.from('productos').select('nombre').eq('id', id).single();
                return `${prod?.nombre}: ${total} unidades`;
            }));
            document.getElementById('topProductos').innerHTML = `<ul>${productosNombres.map(p => `<li>${p}</li>`).join('')}</ul>`;
        }
    </script>
</body>
</html>
